<div class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden font-sans selection:bg-emerald-500/30">
    <!-- Background Immersive Visual -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 emerald-gradient opacity-90"></div>
        <img class="w-full h-full object-cover mix-blend-overlay opacity-40" 
             src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwlnmSZWGWCEuaySvM7FMBo0NxHW_6GiK6ZwFtUgDX72kmF88Tew8HG1z6VNGozPHC7G4x0KM7YMhP-jpqdLTgS4HhR6O6AbRFp0i-W6qUJ1q9X5qmp6cqWmalX3WJEEwWfIDMu7VDC_2jQS6ZdeUVLvSRZMvGjEtxALW8kzFQ_c6SSlQ3vXoxNJUHmUlMLn6iM596NizEeOwUkag5PeJ3L4Je5fUQ_9hbX7XXz8TUxyoCeJacfBzyyMMKWmr_lPhmcFhm7wY9bZg" 
             alt="Background">
    </div>

    <!-- Main Content Canvas -->
    <main class="relative z-10 w-full max-w-[1200px] px-6 py-12 flex justify-center animate-fade-in">
        <div class="glass-panel w-full max-w-md p-10 shadow-premium border border-white/20">
            
            <!-- Branding Header -->
            <div class="mb-12 text-center">
                <div class="inline-flex items-center gap-2 mb-6">
                    <span class="material-symbols-outlined text-primary text-4xl">energy_savings_leaf</span>
                    <h1 class="text-2xl font-black tracking-tighter text-on-surface">Verdant Core</h1>
                </div>
                
                <div class="flex justify-center gap-3 mb-8">
                    <span class="text-[10px] uppercase tracking-widest font-bold px-2 py-1 bg-on-surface text-surface-container-lowest flex items-center gap-1">
                        <span class="material-symbols-outlined text-[12px]">lock</span>
                        Authorized Access Only
                    </span>
                    <span class="text-[10px] uppercase tracking-widest font-bold px-2 py-1 border border-primary text-primary flex items-center gap-1">
                        <span class="material-symbols-outlined text-[12px]">verified_user</span>
                        Secure Session
                    </span>
                </div>
            </div>

            <!-- Login Form -->
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-10">
                
                <!-- Error Message -->
                <div *ngIf="errorMessage" class="p-4 bg-rose-50 border border-rose-100 text-rose-700 text-[12px] font-bold">
                    {{ errorMessage }}
                </div>

                <div class="space-y-6">
                    <div class="space-y-1">
                        <label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant">Email công vụ</label>
                        <input formControlName="email" 
                               class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 text-on-surface focus:ring-0 auth-input-focus placeholder:text-surface-dim transition-all text-sm font-medium" 
                               placeholder="name@verdant-core.gov" type="email"/>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant">Mật khẩu chiến thuật</label>
                        <input formControlName="password" 
                               class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 text-on-surface focus:ring-0 auth-input-focus placeholder:text-surface-dim transition-all text-sm font-medium tracking-widest" 
                               placeholder="••••••••" type="password"/>
                    </div>
                </div>

                <div class="pt-4">
                    <button [disabled]="loginForm.invalid || isLoading" 
                            class="w-full emerald-gradient text-on-primary py-4 text-sm font-bold uppercase tracking-widest hover:opacity-90 transition-all active:scale-[0.98] disabled:opacity-50 flex items-center justify-center gap-3" 
                            type="submit">
                        <span *ngIf="isLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                        {{ isLoading ? 'Đang xác thực...' : 'Đăng nhập' }}
                    </button>
                </div>

                <!-- SSO / Secondary Actions -->
                <div class="pt-4 space-y-4">
                    <div class="relative flex items-center">
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                        <span class="flex-shrink mx-4 text-[10px] uppercase tracking-widest text-on-surface-variant/60 font-medium">Hoặc sử dụng</span>
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <button class="flex items-center justify-center gap-2 py-3 border border-outline-variant/50 hover:bg-surface-container-lowest transition-colors group" type="button">
                            <span class="material-symbols-outlined text-xl group-hover:text-primary transition-colors">vpn_key</span>
                            <span class="text-[10px] uppercase tracking-wider font-bold">Security Key</span>
                        </button>
                        <button class="flex items-center justify-center gap-2 py-3 border border-outline-variant/50 hover:bg-surface-container-lowest transition-colors group" type="button">
                            <span class="material-symbols-outlined text-xl group-hover:text-primary transition-colors">hub</span>
                            <span class="text-[10px] uppercase tracking-wider font-bold">SSO Gateway</span>
                        </button>
                    </div>
                </div>
            </form>

            <!-- Footer Assistance -->
            <div class="mt-12 text-center space-y-6">
                <div class="space-y-2">
                    <p class="text-[11px] text-on-surface-variant font-medium">
                        Quên thông tin truy cập? <a class="text-primary font-bold hover:underline" href="#">Yêu cầu khôi phục</a>
                    </p>
                    <p class="text-[11px] text-on-surface-variant font-medium pt-1">
                        Chưa có tài khoản? <a class="text-primary font-bold hover:underline" routerLink="/signup">Đăng ký ngay</a>
                    </p>
                </div>
                
                <div class="flex justify-center gap-6 pt-4 text-[10px] uppercase tracking-tighter text-on-surface-variant/40 font-bold border-t border-outline-variant/10">
                    <span>Hỗ trợ 24/7</span>
                    <span>Quy định bảo mật</span>
                    <span>v4.2.0-stable</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Aesthetic Decorative Elements -->
    <div class="fixed top-12 left-12 z-20 pointer-events-none hidden lg:block">
        <div class="text-[10px] uppercase tracking-[0.4em] font-light text-white/40 rotate-90 origin-left">
            Precision Management Architecture
        </div>
    </div>
    
    <div class="fixed bottom-12 right-12 z-20 pointer-events-none hidden lg:block text-right">
        <div class="text-[4rem] font-black tracking-tighter leading-none text-white/5 select-none">
            01
        </div>
        <div class="text-[10px] uppercase tracking-[0.2em] font-bold text-white/20">
            System Core Node
        </div>
    </div>
</div>
