<div class="flex h-screen font-sans bg-white overflow-hidden selection:bg-emerald-500/30">

  <!-- 100% Match Sidebar -->
  <aside class="w-[280px] bg-[#f8fafc] border-r border-[#e2e8f0] flex flex-col z-30 shrink-0 relative">
    
    <!-- Sidebar Header: Logo & Subtitle -->
    <div class="p-8 pb-10">
      <div class="flex flex-col gap-[2px]">
        <h1 class="text-[20px] font-black tracking-tight leading-none text-[#0f172a]">
            <span class="text-[#064e3b]">Verdant</span> Admin
        </h1>
        <p class="text-[9px] font-bold text-[#64748b] uppercase tracking-[0.1em] mt-1">Hệ thống quản trị</p>
      </div>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex-1 flex flex-col space-y-2 mt-4 relative">
      <a routerLink="/thong-bao-tinh-hinh" routerLinkActive="active-link"
        class="flex items-center gap-4 px-8 py-3.5 text-[#64748b] hover:text-[#064e3b] transition-all relative font-medium group">
        <span class="material-symbols-outlined text-[20px]">analytics</span>
        <span class="text-[14px] font-semibold tracking-tight group-[.active-link]:text-[#064e3b]">Thông báo tình hình</span>
        <div class="absolute right-[-1px] top-0 bottom-0 w-[2px] bg-[#064e3b] opacity-0 group-[.active-link]:opacity-100"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent to-[#064e3b]/5 opacity-0 group-[.active-link]:opacity-100 pointer-events-none"></div>
      </a>

      <a routerLink="/users" routerLinkActive="active-link"
        class="flex items-center gap-4 px-8 py-3.5 text-[#64748b] hover:text-[#064e3b] transition-all relative font-medium group">
        <span class="material-symbols-outlined text-[20px]">group</span>
        <span class="text-[14px] font-semibold tracking-tight group-[.active-link]:text-[#064e3b]">Quản trị nhân sự</span>
        <div class="absolute right-[-1px] top-0 bottom-0 w-[2px] bg-[#064e3b] opacity-0 group-[.active-link]:opacity-100"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent to-[#064e3b]/5 opacity-0 group-[.active-link]:opacity-100 pointer-events-none"></div>
      </a>

      <a href="javascript:void(0)" (click)="logout()"
        class="flex items-center gap-4 px-8 py-3.5 text-[#64748b] hover:text-rose-600 transition-all relative font-medium group mt-auto">
        <span class="material-symbols-outlined text-[20px] group-hover:text-rose-600">logout</span>
        <span class="text-[14px] font-semibold tracking-tight group-hover:text-rose-600">Đăng xuất</span>
        <div class="absolute right-[-1px] top-0 bottom-0 w-[2px] bg-rose-600 opacity-0 group-hover:opacity-100"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent to-rose-600/5 opacity-0 group-hover:opacity-100 pointer-events-none"></div>
      </a>
    </nav>
  </aside>

  <!-- Main Viewport -->
  <main class="flex-1 flex flex-col relative z-20 overflow-hidden bg-white">
    
    <!-- Exact Match Header -->
    <header class="h-[76px] bg-white border-b border-[#e2e8f0] flex items-center justify-between px-10 shrink-0">
      
      <!-- Search Bar -->
      <div class="relative w-full max-w-[480px]">
        <span class="material-symbols-outlined absolute left-[14px] top-1/2 -translate-y-1/2 text-[#94a3b8] text-[18px]">search</span>
        <input type="text" [placeholder]="searchPlaceholder" [(ngModel)]="globalSearchText" (keyup.enter)="onGlobalSearch()"
          class="w-full bg-[#f1f5f9] hover:bg-[#e2e8f0]/50 border-none rounded-[6px] py-2.5 pl-10 pr-4 text-[13px] font-medium text-[#334155] focus:ring-0 transition-all placeholder:text-[#94a3b8] focus:bg-white focus:ring-[1px] focus:ring-[#064e3b]/50">
      </div>

      <!-- Action Group -->
      <div class="flex items-center gap-6">
        <button class="relative text-[#64748b] hover:text-[#064e3b] transition-colors flex items-center justify-center p-2 rounded-full hover:bg-slate-50">
            <span class="material-symbols-outlined text-[22px]">notifications</span>
            <span class="absolute top-[6px] right-[6px] w-[8px] h-[8px] bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <button (click)="onGlobalAction()" class="flex items-center gap-[6px] bg-[#064e3b] hover:bg-[#047857] text-white px-5 py-2 rounded-[4px] text-[13px] font-bold shadow-sm active:scale-95 transition-all">
            <span class="material-symbols-outlined text-[18px]">add</span>
            {{ actionBtnText }}
        </button>
      </div>
    </header>

    <!-- Content Viewport -->
    <div class="flex-1 overflow-y-auto px-10 py-8 bg-[#fafafa]">
      <router-outlet (activate)="onActivate($event)" />
    </div>

  </main>
</div>
