<!-- Decorative Gradients Layered -->
<div
  class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full pointer-events-none z-0">
</div>
<div
  class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 blur-[120px] rounded-full pointer-events-none z-0">
</div>

<!-- Main Layout Container -->
<div class="flex h-screen overflow-hidden relative z-10 text-slate-900 selection:bg-primary/30 bg-slate-50">

  <!-- Optimized Sidebar -->
  <aside 
    (click)="isSidebarCollapsed = false"
    [class.w-72]="!isSidebarCollapsed" [class.w-20]="isSidebarCollapsed"
    class="bg-white border-r border-slate-200 flex flex-col z-20 shrink-0 shadow-sm transition-all duration-300 relative cursor-pointer"
    [class.cursor-default]="!isSidebarCollapsed"
    data-purpose="sidebar-navigation">
    
    <!-- Sidebar Header -->
    <div class="p-8 pb-6 flex items-center transition-all duration-300" [class.px-4]="isSidebarCollapsed">
      <div
        class="w-11 h-11 rounded-xl bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center shadow-lg shadow-primary/25 shrink-0 transition-transform">
        <span class="material-symbols-outlined text-white text-2xl">rocket_launch</span>
      </div>
      <div class="ml-4 space-y-0.5 overflow-hidden transition-all duration-300" 
           [class.w-0]="isSidebarCollapsed" [class.ml-0]="isSidebarCollapsed" [class.opacity-0]="isSidebarCollapsed">
        <h1 class="text-xl font-black tracking-tight text-slate-900 uppercase whitespace-nowrap">Kickoff<span
            class="text-primary">FE</span></h1>
        <p class="text-[9px] text-slate-900 font-black uppercase tracking-[0.2em] whitespace-nowrap">Hệ Thống Quản Trị</p>
      </div>
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-4 sidebar-nav overflow-y-auto" (click)="$event.stopPropagation()">
      <a routerLink="/tasks" routerLinkActive="bg-primary/10 text-primary shadow-sm !text-primary"
        class="flex items-center rounded-2xl text-slate-700 hover:text-slate-900 hover:bg-slate-50 transition-all group relative overflow-hidden py-3.5"
        [class.px-0]="isSidebarCollapsed" [class.justify-center]="isSidebarCollapsed" [class.px-5]="!isSidebarCollapsed">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform text-slate-400 group-hover:text-primary shrink-0">grid_view</span>
        <span class="ml-3 font-bold text-sm transition-all duration-300 whitespace-nowrap overflow-hidden" 
              [class.max-w-0]="isSidebarCollapsed" [class.ml-0]="isSidebarCollapsed" [class.opacity-0]="isSidebarCollapsed" [class.max-w-xs]="!isSidebarCollapsed">Tổng quan Dashboard</span>
      </a>

      <a routerLink="/users" routerLinkActive="bg-primary/10 text-primary shadow-sm !text-primary"
        class="flex items-center rounded-2xl text-slate-700 hover:text-slate-900 hover:bg-slate-50 transition-all group py-3.5"
        [class.px-0]="isSidebarCollapsed" [class.justify-center]="isSidebarCollapsed" [class.px-5]="!isSidebarCollapsed">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform text-slate-400 group-hover:text-primary shrink-0">group</span>
        <span class="ml-3 font-bold text-sm transition-all duration-300 whitespace-nowrap overflow-hidden" 
              [class.max-w-0]="isSidebarCollapsed" [class.ml-0]="isSidebarCollapsed" [class.opacity-0]="isSidebarCollapsed" [class.max-w-xs]="!isSidebarCollapsed">Quản lý nhân sự</span>
      </a>

      <a routerLink="/thong-bao-tinh-hinh" routerLinkActive="bg-primary/10 text-primary shadow-sm !text-primary"
        class="flex items-center rounded-2xl text-slate-700 hover:text-slate-900 hover:bg-slate-50 transition-all group py-3.5"
        [class.px-0]="isSidebarCollapsed" [class.justify-center]="isSidebarCollapsed" [class.px-5]="!isSidebarCollapsed">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform text-slate-400 group-hover:text-primary shrink-0">campaign</span>
        <span class="ml-3 font-bold text-sm transition-all duration-300 whitespace-nowrap overflow-hidden" 
              [class.max-w-0]="isSidebarCollapsed" [class.ml-0]="isSidebarCollapsed" [class.opacity-0]="isSidebarCollapsed" [class.max-w-xs]="!isSidebarCollapsed">Thông Báo Tình Hình</span>
      </a>

      <!-- Divider Section -->
      <div class="px-5 transition-all duration-300 overflow-hidden mt-8 mb-4 flex items-center group" 
           [class.px-2]="isSidebarCollapsed" [class.justify-center]="isSidebarCollapsed">
        <div class="h-px bg-slate-100 flex-1 transition-all duration-300" [class.opacity-100]="isSidebarCollapsed"></div>
        <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black whitespace-nowrap transition-all duration-300 px-3" 
           [class.max-w-0]="isSidebarCollapsed" [class.p-0]="isSidebarCollapsed" [class.opacity-0]="isSidebarCollapsed" [class.max-w-xs]="!isSidebarCollapsed">Hệ thống</p>
        <div class="h-px bg-slate-100 flex-1 transition-all duration-300" [class.opacity-0]="isSidebarCollapsed"></div>
      </div>

      <a (click)="onLogout()"
        class="flex items-center rounded-2xl text-slate-700 hover:text-red-600 hover:bg-red-50 transition-all group py-3.5 cursor-pointer"
        [class.px-0]="isSidebarCollapsed" [class.justify-center]="isSidebarCollapsed" [class.px-5]="!isSidebarCollapsed">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform text-slate-400 group-hover:text-red-50 shrink-0">logout</span>
        <span class="ml-3 font-bold text-sm transition-all duration-300 whitespace-nowrap overflow-hidden" 
              [class.max-w-0]="isSidebarCollapsed" [class.ml-0]="isSidebarCollapsed" [class.opacity-0]="isSidebarCollapsed" [class.max-w-xs]="!isSidebarCollapsed">Đăng xuất hệ thống</span>
      </a>
    </nav>

    <!-- Sidebar Footer with Usage Metrics -->
    <div class="p-6 mt-auto transition-all duration-500 overflow-hidden" 
         [class.max-h-0]="isSidebarCollapsed" [class.p-0]="isSidebarCollapsed" [class.opacity-0]="isSidebarCollapsed" [class.max-h-52]="!isSidebarCollapsed"
         (click)="$event.stopPropagation()">
      <div class="bg-slate-50 rounded-[2rem] p-5 border border-slate-100 shadow-inner">
        <div class="flex justify-between items-center mb-3 px-1">
          <p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">Trạng thái bộ nhớ</p>
          <p class="text-[10px] text-primary font-black">72%</p>
        </div>
        <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden mb-3">
          <div class="h-full bg-primary w-[72%] rounded-full shadow-[0_0_8_rgba(36,99,235,0.4)]"></div>
        </div>
        <p class="text-[9px] text-slate-600 font-bold text-center">7.2GB / 10GB đã dùng</p>
      </div>
    </div>
  </aside>

  <!-- Main Viewport - Clicks here collapse the sidebar -->
  <main 
    (click)="isSidebarCollapsed = true"
    class="flex-1 flex flex-col overflow-hidden relative bg-white transition-all duration-300">

    <!-- Content Viewport -->
    <div class="flex-1 overflow-y-auto w-full relative scroll-smooth px-8 py-6">
      <router-outlet />
    </div>

  </main>
</div>
